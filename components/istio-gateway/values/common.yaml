resources:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: toolforge-gateway-config
    data:
      deployment: |
        spec:
          replicas: 3
          template:
            spec:
              containers:
                - name: istio-proxy
                  resources:
                    limits:
                      cpu: 3
                      memory: 6G
                    requests:
                      cpu: 2
                      memory: 5G
              tolerations:
                - key: "toolforge.org/gateway"
                  operator: "Equal"
                  value: "true"
                  effect: "NoSchedule"
              affinity:
                nodeAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                    - weight: 100
                      preference:
                        matchExpressions:
                          - key: kubernetes.io/role
                            operator: In
                            values:
                              - "gateway"
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                    matchLabels:
                      gateway.networking.k8s.io/gateway-class-name: istio
                      gateway.networking.k8s.io/gateway-name: toolforge
      service: |
        spec:
          type: NodePort
          externalTrafficPolicy: Local
          ports:
            - port: 80
              nodePort: 30000
            - port: 15021
              nodePort: 30021

  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: toolforge
    spec:
      gatewayClassName: istio
      infrastructure:
        parametersRef:
          group: ""
          kind: ConfigMap
          name: toolforge-gateway-config
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
