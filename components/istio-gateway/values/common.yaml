resources:
  - apiVersion: telemetry.istio.io/v1
    kind: Telemetry
    metadata:
      name: toolforge-logging
      # This needs to be in the istio-system namespace to be applied globally.
      namespace: istio-system
    spec:
      # For reference, see
      #  - https://istio.io/latest/docs/tasks/observability/metrics/telemetry-api/
      #  - https://istio.io/latest/docs/reference/config/metrics/
      #  - https://istio.io/latest/docs/reference/config/telemetry/
      metrics:
        - providers:
            - name: prometheus
          overrides:
            # Remove grpc-specific labels, not relevant to us
            - tagOverrides:
                grpc_response_status:
                  operation: REMOVE
            # Remove source information labels, knowing the request came from the Gateway
            # is not interesting
            - tagOverrides:
                reporter:
                  operation: REMOVE
                source_workload:
                  operation: REMOVE
                source_workload_namespace:
                  operation: REMOVE
                source_principal:
                  operation: REMOVE
                source_app:
                  operation: REMOVE
                source_version:
                  operation: REMOVE
                source_canonical_service:
                  operation: REMOVE
                source_canonical_revision:
                  operation: REMOVE
                source_cluster:
                  operation: REMOVE
            # Remove other labels not relevant to us
            - tagOverrides:
                destination_workload:
                  operation: REMOVE
                destination_principal:
                  operation: REMOVE
                destination_app:
                  operation: REMOVE
                destination_version:
                  operation: REMOVE
                destination_canonical_service:
                  operation: REMOVE
                destination_canonical_revision:
                  operation: REMOVE
                destination_cluster:
                  operation: REMOVE
                request_protocol:
                  operation: REMOVE
                connection_security_policy:
                  operation: REMOVE
            # Remove high-cardinality bytes counters
            - disabled: true
              match:
                metric: REQUEST_SIZE
            - disabled: true
              match:
                metric: RESPONSE_SIZE
            # Reduce cardinality from response time metric
            - match:
                metric: REQUEST_DURATION
              tagOverrides:
                response_flags:
                  operation: REMOVE
                response_code:
                  operation: REMOVE

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: toolforge-gateway-config
    data:
      deployment: |
        spec:
          replicas: 3
          template:
            spec:
              containers:
                - name: istio-proxy
                  resources:
                    limits:
                      cpu: 3
                      memory: 6G
                    requests:
                      cpu: 2
                      memory: 5G
              tolerations:
                - key: "toolforge.org/gateway"
                  operator: "Equal"
                  value: "true"
                  effect: "NoSchedule"
              affinity:
                nodeAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                    - weight: 100
                      preference:
                        matchExpressions:
                          - key: kubernetes.io/role
                            operator: In
                            values:
                              - "gateway"
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                    matchLabels:
                      gateway.networking.k8s.io/gateway-class-name: istio
                      gateway.networking.k8s.io/gateway-name: toolforge
      service: |
        spec:
          type: NodePort
          externalTrafficPolicy: Local
          ports:
            - port: 80
              nodePort: 30000
            - port: 15021
              nodePort: 30021

  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: toolforge
    spec:
      gatewayClassName: istio
      infrastructure:
        parametersRef:
          group: ""
          kind: ConfigMap
          name: toolforge-gateway-config
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
