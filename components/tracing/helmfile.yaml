environments:
  local:
    values:
      # needed to use the chartVersion
      - values/common.yaml*
      - values/{{ .Environment.Name }}.yaml*
  tools:
    values:
      # needed to use the chartVersion
      - values/common.yaml*
      - values/{{ .Environment.Name }}.yaml*
  toolsbeta:
    values:
      # needed to use the chartVersion
      - values/common.yaml*
      - values/{{ .Environment.Name }}.yaml*
---
repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: loki-tracing-secret
    chart: wmf-stable/raw
    version: 0.3.0
    namespace: loki-tracing
    values:
      - resources:
          - apiVersion: v1
            kind: Secret
            metadata:
              name: loki-tracing-basic-auth
            type: Opaque
            stringData:
              .htpasswd: "{{ .Values.lokiTracing.htpasswd }}"
  - name: loki-tracing
    namespace: loki-tracing
    createNamespace: true
    chart: grafana/loki
    version: "{{ .Values.loki.chartVersion }}"
    values:
      - ../common/values/loki/common.yaml*
      - ../common/values/loki/{{ .Environment.Name }}.yaml*
      - values/common.yaml*
      - values/{{ .Environment.Name }}.yaml*
