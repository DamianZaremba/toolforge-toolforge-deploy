nameOverride: loki-tracing

gateway:
  enabled: true
  containerPort: 8443
  image:
    registry: docker-registry.svc.toolforge.org
    repository: nginx
    tag: latest
  service:
    type: NodePort
    nodePort: 30004
    port: 8443
  ingress:
    enabled: true
  basicAuth:
    enabled: true
    existingSecret: loki-tracing-basic-auth
  nginxConfig:
    ssl: true
    serverSnippet: |
      ssl_certificate     /etc/tls/tls.crt;
      ssl_certificate_key /etc/tls/tls.key;
  extraVolumes:
    - name: loki-tracing-tls
      secret:
        secretName: loki-tracing-tls-secret
  extraVolumeMounts:
    - name: loki-tracing-tls
      mountPath: /etc/tls
      readOnly: true
  readinessProbe:
    httpGet: null
    exec:
      command:
      - curl
      - --fail
      - --silent
      - --insecure # Required for the curl command to work
      - https://localhost:8443/

networkPolicy:
  enabled: true
  externalStorage:
    cidrs:
      # object.eqiad1.wikimediacloud.org
      - 185.15.56.161/32
      - 2a02:ec80:a000:4000::1/128
    ports: [443]
  metrics:
    cidrs:
      - 127.0.0.1/32

extraObjects:
  # This needs to be present on each Loki deployment
  # to have it provisioned in the right namespace.
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: loki-tracing-allow-dns
    spec:
      policyTypes:
        - Egress
      podSelector: {}
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
              podSelector:
                matchLabels:
                  k8s-app: kube-dns
          ports:
            - protocol: UDP
              port: 53
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: loki-tracing-allow-gateway-ingress
      namespace: loki-tracing
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: loki-tracing
          app.kubernetes.io/instance: loki-tracing
          app.kubernetes.io/component: gateway
      policyTypes:
        - Ingress
      ingress:
        - from:
          ports:
            - protocol: TCP
              port: 8443
  - apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: loki-tracing-tls
    spec:
      selfSigned: {}
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: loki-tracing-tls
      namespace: loki-tracing
    spec:
      secretName: loki-tracing-tls-secret
      issuerRef:
        name: loki-tracing-tls
        kind: Issuer
        group: cert-manager.io
      commonName: loki-tracing.loki.svc.cluster.local
      dnsNames:
        - loki-tracing.loki.svc.cluster.local
        - loki-tracing-write.loki.svc.tools.local
        - loki-tracing-write.loki.svc.toolsbeta.local
